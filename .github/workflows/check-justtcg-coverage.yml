name: Check JustTCG coverage

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: justtcg-coverage
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      JUSTTCG_API_KEY: ${{ secrets.JUSTTCG_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/justtcg-integration

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check secret
        run: test -n "$JUSTTCG_API_KEY"

      - name: Run coverage probe
        run: python scripts/check_justtcg_coverage.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: justtcg-coverage-report
          path: |
            data/coverage-report.json
            data/coverage-report.md
          if-no-files-found: error

      - name: Commit report to integration branch
        run: |
          if git diff --quiet -- data/coverage-report.json data/coverage-report.md; then
            echo "Coverage report unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/coverage-report.json data/coverage-report.md
          git commit -m "chore: update JustTCG coverage report"
          git push
